events {
    worker_connections 1024;
}

http {
    # Basic settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # MIME types
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;  # 작은 응답(< 1KB)은 압축 제외 — CPU 이익 無 + 외부
                           # keyword 모니터가 raw 바이트 검색 시 실패 방지 (#71).
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # Upstream API server
    upstream api {
        server api:3000;
    }

    # HTTP server
    server {
        listen 80;
        server_name api.amazingkorean.net;

        # Let's Encrypt challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect to HTTPS (uncomment after SSL setup)
        # location / {
        #     return 301 https://$host$request_uri;
        # }

        # Health check: origin 레벨에서 gzip 명시적 off.
        # gzip_min_length 1024 로도 40B body 는 제외되지만 이중 안전장치.
        #
        # 한계 (#71 P2 시도 후 확인, 2026-04-17): Cloudflare edge 가
        # Accept-Encoding 에 따라 자체 Brotli/gzip 재압축을 수행한다.
        # Cache-Control: no-transform 을 origin 에서 추가 시도했으나 curl
        # 실측 시 응답에 헤더 자체가 없었고 CF 도 무시 가능성 존재 →
        # UptimeRobot Keyword 모니터는 Free 플랜으로는 구현 불가라 HTTP
        # 상태코드 모니터로 전환. 따라서 현재 /health 는 외부에서 볼 때
        # 여전히 gzip 으로 감싸져 옴 (CF edge 동작). 이 gzip off 블록은
        # origin 응답을 평문으로 유지 — 향후 서브도메인 grey-cloud 구성
        # 시 즉시 keyword 매칭 되도록 기반만 보존.
        location = /health {
            gzip off;
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Temporary: Proxy to API (HTTP mode - remove after SSL setup)
        location / {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # HTTPS server (uncomment after SSL setup)
    # server {
    #     listen 443 ssl http2;
    #     server_name api.amazingkorean.net;
    #
    #     ssl_certificate /etc/letsencrypt/live/api.amazingkorean.net/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/api.amazingkorean.net/privkey.pem;
    #
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    #     ssl_prefer_server_ciphers off;
    #
    #     # Security headers
    #     add_header X-Frame-Options "SAMEORIGIN" always;
    #     add_header X-Content-Type-Options "nosniff" always;
    #     add_header X-XSS-Protection "1; mode=block" always;
    #     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    #
    #     location / {
    #         limit_req zone=api_limit burst=20 nodelay;
    #
    #         proxy_pass http://api;
    #         proxy_http_version 1.1;
    #         proxy_set_header Host $host;
    #         proxy_set_header X-Real-IP $remote_addr;
    #         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto $scheme;
    #     }
    # }
}
