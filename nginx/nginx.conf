    #     ssl_trusted_certificate /etc/letsencrypt/live/api.amazingkorean.net/chain.pem;
    #
    #     # TLS 1.2+1.3 (TLS 1.0/1.1 PCI-DSS 비권장 = 제외)
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     # TLS 1.3 cipher (자동 선택, 변경 불가)
    #     # TLS 1.2 cipher (Mozilla Intermediate 2025 기준)
