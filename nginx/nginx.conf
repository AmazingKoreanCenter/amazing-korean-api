events {
    worker_connections 1024;
}

http {
    # Basic settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # MIME types
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;  # 작은 응답(< 1KB)은 압축 제외 — CPU 이익 無 + 외부
                           # keyword 모니터가 raw 바이트 검색 시 실패 방지 (#71).
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # Upstream API server
    upstream api {
        server api:3000;
    }

    # SSL session cache (HTTPS 활성 후 effect)
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling (HTTPS 활성 후 effect, Let's Encrypt 인증서 발급 후)
    # ssl_stapling on;
    # ssl_stapling_verify on;
    # resolver 1.1.1.1 1.0.0.1 valid=300s;
    # resolver_timeout 5s;

    # HTTP server
    server {
        listen 80;
        server_name api.amazingkorean.net;

        # Let's Encrypt HTTP-01 challenge (HTTPS 활성 후에도 유지 — 인증서 갱신 챌린지 경로)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # HTTP → HTTPS redirect (Phase B 사용자 작업: HTTPS 활성 +
        # Cloudflare Full Strict 전환 완료 후 주석 해제. 절차 = AMK_DEPLOY_OPS §3 참조)
        # location / {
        #     return 301 https://$host$request_uri;
        # }

        # Health check: origin 레벨에서 gzip 명시적 off.
        # gzip_min_length 1024 로도 40B body 는 제외되지만 이중 안전장치.
        #
        # 한계 (#71 P2 시도 후 확인, 2026-04-17): Cloudflare edge 가
        # Accept-Encoding 에 따라 자체 Brotli/gzip 재압축을 수행한다.
        # Cache-Control: no-transform 을 origin 에서 추가 시도했으나 curl
        # 실측 시 응답에 헤더 자체가 없었고 CF 도 무시 가능성 존재 →
        # UptimeRobot Keyword 모니터는 Free 플랜으로는 구현 불가라 HTTP
        # 상태코드 모니터로 전환. 따라서 현재 /health 는 외부에서 볼 때
        # 여전히 gzip 으로 감싸져 옴 (CF edge 동작). 이 gzip off 블록은
        # origin 응답을 평문으로 유지 — 향후 서브도메인 grey-cloud 구성
        # 시 즉시 keyword 매칭 되도록 기반만 보존.
        location = /health {
            gzip off;
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Temporary: Proxy to API (HTTP mode - remove after SSL setup)
        location / {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # =========================================================================
    # HTTPS server (Phase B 사용자 작업: certbot 인증서 발급 후 주석 해제)
    # 절차: AMK_DEPLOY_OPS §3 SSL 인증서 발급 + Phase B 단계별 가이드 참조.
