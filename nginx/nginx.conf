events {
    worker_connections 1024;
}

http {
    # Basic settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # MIME types
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;  # 작은 응답(< 1KB)은 압축 제외 — CPU 이익 無 + 외부
                           # keyword 모니터가 raw 바이트 검색 시 실패 방지 (#71).
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # Upstream API server
    upstream api {
        server api:3000;
    }

    # SSL session cache
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling (Let's Encrypt 인증서 발급 후 활성)
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 1.0.0.1 valid=300s;
    resolver_timeout 5s;

    # HTTP server (port 80)
    # 역할: (1) Let's Encrypt HTTP-01 챌린지 갱신, (2) HTTP→HTTPS redirect,
    #       (3) /health (gzip off 정책 #71 정합, Cloudflare 80 모니터링용)
    server {
        listen 80;
        server_name api.amazingkorean.net;

        # Let's Encrypt HTTP-01 challenge (인증서 갱신 시 필요, 영구 유지)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Health check: origin 레벨에서 gzip 명시적 off.
        # gzip_min_length 1024 로도 40B body 는 제외되지만 이중 안전장치.
        # Cloudflare edge 가 자체 Brotli/gzip 재압축 (#71 한계). 본 블록은
        # origin 응답 평문 유지 — 향후 grey-cloud 구성 시 keyword 매칭 기반.
        location = /health {
            gzip off;
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # HTTP→HTTPS redirect (Cloudflare "Always Use HTTPS" 와 이중 안전망)
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # =========================================================================
    # HTTPS server (port 443) — Phase B 활성 버전 (2026-05-07)
    # =========================================================================
    server {
        listen 443 ssl;
        http2 on;
        server_name api.amazingkorean.net;

        # Let's Encrypt 인증서
        ssl_certificate /etc/letsencrypt/live/api.amazingkorean.net/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.amazingkorean.net/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/api.amazingkorean.net/chain.pem;

        # TLS 1.2+1.3 (TLS 1.0/1.1 PCI-DSS 비권장 = 제외)
        ssl_protocols TLSv1.2 TLSv1.3;
        # TLS 1.3 cipher = 자동 선택 (변경 불가)
        # TLS 1.2 cipher = Mozilla Intermediate 2025
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        # HSTS (origin layer, N-31): max-age 1년 + includeSubDomains. preload 는
        # 사용자 결정 (브라우저 preload 리스트 등재 = 영구적, 롤백 어려움).
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Health check (HTTPS 모드에서도 gzip off 정책 유지, #71)
        location = /health {
            gzip off;
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
