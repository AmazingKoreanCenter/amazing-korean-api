name: Deploy to EC2

on:
  push:
    branches: [main, KKRYOUN]
  workflow_dispatch:  # 수동 실행 가능

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/amazing-korean-api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync docker-compose.prod.yml + nginx config to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          # docker-compose.prod.yml → ~/amazing-korean-api/
          # nginx/nginx.conf     → ~/amazing-korean-api/nginx/nginx.conf (경로 보존)
          source: "docker-compose.prod.yml,nginx/nginx.conf"
          target: "~/amazing-korean-api/"

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/amazing-korean-api

            # Pull latest image
            docker pull ${{ env.DOCKER_IMAGE }}:latest

            # Update .env.prod
            cat > .env.prod << 'EOF'
            DOCKER_IMAGE=${{ env.DOCKER_IMAGE }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            DOMAIN=amazingkorean.net
            CORS_ORIGINS=https://amazingkorean.net,https://www.amazingkorean.net
            FRONTEND_URL=https://amazingkorean.net
            ENCRYPTION_KEY_V1=${{ secrets.ENCRYPTION_KEY_V1 }}
            HMAC_KEY=${{ secrets.HMAC_KEY }}
            ENCRYPTION_CURRENT_VERSION=1
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            GOOGLE_REDIRECT_URI=https://api.amazingkorean.net/auth/google/callback
            EMAIL_FROM_ADDRESS=noreply@amazingkorean.net
            ADMIN_IP_ALLOWLIST=
            EMAIL_PROVIDER=resend
            RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
            VIMEO_ACCESS_TOKEN=${{ secrets.VIMEO_ACCESS_TOKEN }}
            PAYMENT_PROVIDER=${{ secrets.PAYMENT_PROVIDER }}
            PADDLE_API_KEY=${{ secrets.PADDLE_API_KEY }}
            PADDLE_CLIENT_TOKEN=${{ secrets.PADDLE_CLIENT_TOKEN }}
            PADDLE_SANDBOX=${{ secrets.PADDLE_SANDBOX }}
            PADDLE_WEBHOOK_SECRET=${{ secrets.PADDLE_WEBHOOK_SECRET }}
            PADDLE_PRICE_MONTH_1=${{ secrets.PADDLE_PRICE_MONTH_1 }}
            PADDLE_PRICE_MONTH_3=${{ secrets.PADDLE_PRICE_MONTH_3 }}
            PADDLE_PRICE_MONTH_6=${{ secrets.PADDLE_PRICE_MONTH_6 }}
            PADDLE_PRICE_MONTH_12=${{ secrets.PADDLE_PRICE_MONTH_12 }}
            PADDLE_PRICE_EBOOK=${{ secrets.PADDLE_PRICE_EBOOK }}
            PADDLE_DISCOUNT_MONTH_3=${{ secrets.PADDLE_DISCOUNT_MONTH_3 }}
            PADDLE_DISCOUNT_MONTH_6=${{ secrets.PADDLE_DISCOUNT_MONTH_6 }}
            PADDLE_DISCOUNT_MONTH_12=${{ secrets.PADDLE_DISCOUNT_MONTH_12 }}
            REVENUECAT_API_KEY=${{ secrets.REVENUECAT_API_KEY }}
            REVENUECAT_WEBHOOK_AUTH_TOKEN=${{ secrets.REVENUECAT_WEBHOOK_AUTH_TOKEN }}
            EOF

            # Restart containers
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d

            # nginx.conf 는 volume-mount (docker-compose.prod.yml L122) 되어 있어
            # 파일이 바뀌어도 컨테이너는 재시작 안 됨. 변경사항 반영 위해 reload 호출.
            # 재시도 루프:
            #   docker compose up -d 는 api 컨테이너 recreate 를 비동기로 시작
            #   하므로, api 가 docker internal DNS (127.0.0.11) 에 재등록되기
            #   전에 nginx -t 가 돌면 `host not found in upstream api:3000` 으로
            #   실패한다 (INC-002, 2026-04-18 약 20분 다운). 최대 6회 × 5초
            #   재시도로 DNS 재등록을 대기한다.
            # fail-safe:
            #   6회 전부 실패해도 nginx 는 기존 정상 config 로 계속 서빙 중
            #   이므로 워크플로 전체를 실패로 만들지 않는다. nginx.conf 변경이
            #   실제로 반영이 안 된 경우는 다음 배포에서 재시도되며, 서비스
            #   트래픽은 단절 없이 유지된다.
            nginx_reloaded=false
            for i in 1 2 3 4 5 6; do
              if docker exec amk-nginx nginx -t 2>&1; then
                docker exec amk-nginx nginx -s reload
                echo "nginx config reloaded (attempt $i)"
                nginx_reloaded=true
                break
              fi
              echo "nginx -t failed (attempt $i/6) — retry in 5s"
              sleep 5
            done
            if [ "$nginx_reloaded" = "false" ]; then
              echo "⚠️  nginx -t failed 6x — reload skipped, keeping old config (fail-safe)"
            fi

            # Cleanup old images
            docker image prune -f

      - name: Health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/amazing-korean-api

            echo "Waiting for server to start..."
            sleep 10

            # Health check via nginx (실제 프로덕션 트래픽 경로).
            # api 컨테이너는 포트를 호스트에 publish 하지 않고 내부 docker
            # network 에서 nginx 가 upstream api:3000 으로 proxy. 따라서
            # 호스트에서 curl localhost:3000 은 연결 불가 → nginx :80 경유
            # + Host 헤더로 server_name 매칭해서 /health 까지 도달.
            for i in 1 2 3 4 5; do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                -H 'Host: api.amazingkorean.net' \
                http://localhost/health || true)
              if [ "$STATUS" = "200" ]; then
                echo "Health check passed (attempt $i)"
                exit 0
              fi
              echo "Health check failed (attempt $i, status=$STATUS), retrying in 10s..."
              sleep 10
            done

            echo "Health check failed after 5 attempts"
            echo "=== Container status ==="
            docker compose -f docker-compose.prod.yml --env-file .env.prod ps
            echo "=== api Exit code (crash loop 확인) ==="
            docker ps -a --filter "name=amk-api" --format "table {{.Names}}\t{{.Status}}\t{{.RunningFor}}"
            echo "=== api container logs (tail 100) ==="
            docker compose -f docker-compose.prod.yml --env-file .env.prod logs --tail=100 api
            exit 1
