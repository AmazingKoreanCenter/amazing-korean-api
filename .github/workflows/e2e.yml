# G2: Playwright E2E (2026-05-10, 권장 5단계 [4/5])
#
# 별도 workflow 파일 = pr-check.yml 의 빠른 검증 (~3-5min) 에 e2e (~5-10min) 통합 X.
# branch protection required check 에 등재하지 않으면 e2e fail 시에도 PR 머지 가능
# = 첫 도입 시 안정화 트랙. 안정화 검증 후 (a) required check 등재 또는
# (b) pr-check.yml 통합 결정.
#
# trigger:
# - push KKRYOUN = 매 PR 사이클 자동 실행 (안정성 측정 누적)
# - workflow_dispatch = 수동 실행
#
# 시나리오 = e2e/writing_practice.spec.ts (P10-C, 1 spec) — 자유 연습 1회 완료
# → /studies/writing/stats total_sessions +1 검증.

name: E2E (Playwright)

on:
  push:
    branches: [KKRYOUN]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Playwright Chromium
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: amazing_korean_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 16379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/amazing_korean_db
      REDIS_URL: redis://127.0.0.1:16379
      JWT_SECRET: ci_jwt_secret_must_be_at_least_32_bytes_long
      EMAIL_PROVIDER: "none"
      PAYMENT_PROVIDER: "none"
      SQLX_OFFLINE: "true"
      BIND_ADDR: 127.0.0.1:3100
      RUST_LOG: amazing_korean_api=warn,tower_http=warn
      # psql step 이 lex order 로 모든 migration 직접 적용 (G16 workaround) →
      # backend startup 시 sqlx::migrate! 재실행 = `_sqlx_migrations` 테이블이
      # 비어있어 처음부터 다시 실행 시도 → 'type already exists' 충돌. SKIP=1 으로
      # backend 측 startup migration 우회.
      SKIP_STARTUP_MIGRATIONS: "1"
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      # backend / integration job 과 동일 shared-key = dep cache 재사용
      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "backend"
          save-if: ${{ github.ref == 'refs/heads/KKRYOUN' }}
          cache-on-failure: "true"

      - name: Generate HMAC + ENCRYPTION keys (ephemeral)
        run: |
          echo "HMAC_KEY=$(openssl rand -base64 32)" >> $GITHUB_ENV
          echo "ENCRYPTION_KEY_V1=$(openssl rand -base64 32)" >> $GITHUB_ENV

      # G16 workaround = lex order (pr-check.yml integration job 과 동일)
      - name: Apply migrations
        run: |
          set -e
          for f in migrations/*.sql; do
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -q -f "$f"
          done

      # debug build = release 보다 빠름 (~1-2min vs 5-10min)
      - name: Build backend (debug)
        run: cargo build --bin amazing-korean-api --locked

      - name: Start backend (background)
        run: |
          ./target/debug/amazing-korean-api > backend.log 2>&1 &
          echo $! > backend.pid
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          REDIS_URL: ${{ env.REDIS_URL }}
          JWT_SECRET: ${{ env.JWT_SECRET }}
          HMAC_KEY: ${{ env.HMAC_KEY }}
          ENCRYPTION_KEY_V1: ${{ env.ENCRYPTION_KEY_V1 }}
          EMAIL_PROVIDER: ${{ env.EMAIL_PROVIDER }}
          PAYMENT_PROVIDER: ${{ env.PAYMENT_PROVIDER }}
          BIND_ADDR: ${{ env.BIND_ADDR }}
          RUST_LOG: ${{ env.RUST_LOG }}
          SKIP_STARTUP_MIGRATIONS: ${{ env.SKIP_STARTUP_MIGRATIONS }}

      - name: Wait for backend healthz
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3100/healthz > /dev/null 2>&1; then
              echo "backend ready (attempt $i)"
              exit 0
            fi
            sleep 2
          done
          echo "backend did not respond at /healthz within 60s"
          echo "=== backend.log tail ==="
          tail -50 backend.log || true
          exit 1

      - name: Create E2E test account
        run: |
          curl -fsS -X POST http://127.0.0.1:3100/users \
            -H 'Content-Type: application/json' \
            -d '{
              "email": "e2e_p10c@amazingkorean.net",
              "password": "password123!",
              "name": "E2E Tester",
              "nickname": "e2e_p10c",
              "terms_service": true,
              "terms_personal": true,
              "language": "ko",
              "country": "KR",
              "birthday": "2000-01-01",
              "gender": "none"
            }'

      - name: Setup Node.js 20 (with npm cache)
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Chromium (with system deps)
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      # G2-1 (2026-05-11): vite dev → preview 전환. dev mode = lazy chunk on-demand
      # compile = login page React.lazy chunk 가 cold start 시 60-90s timeout 안에
      # 안정 보장 어려움. preview = production build 결과물 정적 서빙 = compile
      # 단계 0 = cold 이슈 원천 제거. trade-off = build step (~20s) 추가.
      - name: Build frontend (production bundle)
        working-directory: frontend
        run: npm run build

      - name: Start Vite preview (background, proxy → backend 3100)
        working-directory: frontend
        env:
          VITE_PROXY_TARGET: http://127.0.0.1:3100
        run: |
          npm run preview -- --host 0.0.0.0 --port 5173 > vite.log 2>&1 &
          echo $! > vite.pid

      - name: Wait for Vite
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:5173 > /dev/null 2>&1; then
              echo "vite ready (attempt $i)"
              exit 0
            fi
            sleep 2
          done
          echo "vite did not respond within 60s"
          echo "=== vite.log tail ==="
          tail -50 frontend/vite.log || true
          exit 1

      - name: Run Playwright tests
        working-directory: frontend
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: frontend/test-results/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload backend log on failure (debugging)
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: backend-log
          path: backend.log
          retention-days: 7
          if-no-files-found: ignore
