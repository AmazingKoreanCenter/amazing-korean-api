name: PR Check

# 도입 배경 (2026-05-04, INC-005 학습):
# deploy.yml 은 main push 에만 트리거 (KKRYOUN 제거됨). 그 결과 KKRYOUN push 시
# 자동 검증이 사라져 컴파일/타입/lint 에러를 머지 후 deploy 단계에서야 발견.
# 본 워크플로는 KKRYOUN push 시점에 backend (cargo check + clippy) + frontend
# (build + lint) 검증을 자동 실행하여 머지 전 차단한다. 배포 책임은 없음
# (deploy.yml 단일 책임 유지).

on:
  push:
    branches: [KKRYOUN]
  workflow_dispatch:

# 같은 ref 에 대해 push 가 빠르게 연속 발생하면 이전 실행 취소 (CI 분 절약)
concurrency:
  group: pr-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (cargo check + clippy)
    runs-on: ubuntu-latest
    env:
      # sqlx offline mode — DB 없이 .sqlx/ 쿼리 캐시로 컴파일
      SQLX_OFFLINE: "true"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain (stable + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check --all (rustfmt baseline, 2026-05-04 도입)
        # rust-toolchain.toml 에 rustfmt components 등재됐으나 자동 강제 부재로
        # dormant 상태였음. main HEAD baseline 통과 확인 후 즉시 활성화.
        run: cargo fmt --check --all

      - name: cargo check (--locked = Cargo.lock 정합성 같이 검증)
        run: cargo check --locked --workspace

      - name: cargo clippy (-D warnings = warning 도 fail)
        run: cargo clippy --lib --bins --locked -- -D warnings

  # G1/G2 해제 (2026-05-09): postgres + redis service container 도입.
  # tests/{auth_email_integration, auth_login_integration, auth_oauth_integration,
  # repo_integration, service_integration, user_signup_integration}.rs 의
  # `#[ignore]` 부착 통합 테스트를 `--include-ignored` 로 실행. backend job 과
  # 별도 job 으로 분리해 frontend job 병행 + 인프라 비용 격리.
  integration:
    name: backend integration (postgres + redis services)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: amazing_korean_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 16379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/amazing_korean_db
      # CI redis 는 인증 미설정 (로컬 dev = redis_dev_password). URL 도 인증 부분 제거.
      REDIS_URL: redis://127.0.0.1:16379
      JWT_SECRET: ci_jwt_secret_must_be_at_least_32_bytes_long
      EMAIL_PROVIDER: "none"
      PAYMENT_PROVIDER: "none"
      SQLX_OFFLINE: "true"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Generate HMAC + ENCRYPTION keys (ephemeral, CI-only)
        run: |
          echo "HMAC_KEY=$(openssl rand -base64 32)" >> $GITHUB_ENV
          echo "ENCRYPTION_KEY_V1=$(openssl rand -base64 32)" >> $GITHUB_ENV

      - name: Apply migrations (psql + lexicographic order, G16 workaround)
        # G16 알려진 이슈 = legacy 14자리 timestamp (`20260210000001` 등) 가 sqlx
        # 의 numeric version 정렬에서 8자리 (`20260210`) 보다 *뒤에* 옴. 그러나
        # production 시점에는 14자리가 먼저 적용되어 의존성 (예: content_type_enum
        # 생성) 을 제공. fresh DB 에서 sqlx migrate run = 의존성 부재로 fail.
        #
        # 해결책 = bash glob 의 lexicographic 정렬 (`_` 0x5F > `0` 0x30 →
        # `20260210000001_` 가 `20260210_` 보다 먼저) 이 production 시간순과
        # 정확히 일치. sqlx-cli 미사용, psql 직접 호출.
        run: |
          set -e
          for f in migrations/*.sql; do
            echo "Applying: $f"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -q -f "$f"
          done

      - name: cargo test --include-ignored (통합 + 단위)
        # --workspace --locked = cargo flag. `--include-ignored` 는 test runner 인자
        # → `--` 뒤에 위치. `#[ignore]` 부착 통합 테스트도 함께 실행.
        run: cargo test --workspace --locked -- --include-ignored

  frontend:
    name: frontend (build + lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20 (with npm cache)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci
        run: npm ci

      # npm run build = tsc -b && vite build (package.json scripts.build)
      # tsc -b 가 type check 포함하므로 별도 npx tsc --noEmit 불필요
      - name: npm run build
        run: npm run build

      # 일시 비활성화 (Q16, 2026-05-04): 본 워크플로 self-test 시 ESLint 27 errors 검출
      # = 기존 main baseline 의 lint 위반 누적 (대부분 shadcn/ui 컴포넌트 +
      # variants 같은 파일 export 패턴 vs 새 react-refresh 룰 충돌). 한 번에 fix
      # 어려운 아키텍처 작업 → Q16 별도 트랙으로 분리. baseline cleanup 완료 후
      # `continue-on-error: false` 로 재활성화 예정.
      - name: npm run lint (ESLint)
        run: npm run lint
        continue-on-error: true

      # 하드코딩 색상 검사 (Tailwind 토큰화 정책)
      # 2026-05-04: 첫 자동 실행 시 9곳 누적 위반 검출 (textbook_order_page.tsx 4곳 +
      # receipt_parts.tsx 1곳 + book_hub_page.tsx 4곳 + HangulKeyboardKey.tsx 1곳).
      # 디자인 토큰 결정 + 코드 교체 = Q16 baseline cleanup 트랙으로 분리.
      # 임시 continue-on-error: true. cleanup 후 제거.
      - name: npm run lint:ui (hardcoded colors)
        run: npm run lint:ui
        continue-on-error: true
