# A4-5: Docker log 로테이션 (서비스당 최대 30MB = 10m × 3 파일). 무한 누적 방지.
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  api:
    image: ${DOCKER_IMAGE:-amazing-korean-api}:latest
    container_name: amk-api
    restart: always
    environment:
      # 보안 2.3 Phase 2 컷오버 (2026-05-18): postgres(superuser) → amk_app(NOSUPERUSER).
      # 롤백 = user 를 postgres, ${APP_DB_PASSWORD} 를 ${POSTGRES_PASSWORD} 로 환원 1줄.
      DATABASE_URL: postgres://amk_app:${APP_DB_PASSWORD}@db:5432/amazing_korean_db
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TTL_MIN: 15
      REFRESH_TTL_DAYS: 30
      REFRESH_TTL_DAYS_ADMIN: ${REFRESH_TTL_DAYS_ADMIN:-7}
      REFRESH_TTL_DAYS_HYMN: ${REFRESH_TTL_DAYS_HYMN:-1}
      REFRESH_COOKIE_NAME: ak_refresh
      REFRESH_COOKIE_DOMAIN: ${DOMAIN}
      REFRESH_COOKIE_SECURE: "true"
      REFRESH_COOKIE_SAMESITE: Lax
      BIND_ADDR: 0.0.0.0:3000
      ENABLE_DOCS: 0
      RATE_LIMIT_LOGIN_WINDOW_SEC: 900
      RATE_LIMIT_LOGIN_MAX: 10
      RATE_LIMIT_STUDY_WINDOW_SEC: 60
      RATE_LIMIT_STUDY_MAX: 30
      RATE_LIMIT_EMAIL_WINDOW_SEC: ${RATE_LIMIT_EMAIL_WINDOW_SEC:-18000}
      RATE_LIMIT_EMAIL_MAX: ${RATE_LIMIT_EMAIL_MAX:-5}
      RATE_LIMIT_MFA_MAX: ${RATE_LIMIT_MFA_MAX:-5}
      RATE_LIMIT_MFA_WINDOW_SEC: ${RATE_LIMIT_MFA_WINDOW_SEC:-300}
      CORS_ORIGINS: ${CORS_ORIGINS}
      ENCRYPTION_KEY_V1: ${ENCRYPTION_KEY_V1}
      ENCRYPTION_CURRENT_VERSION: ${ENCRYPTION_CURRENT_VERSION:-1}
      HMAC_KEY: ${HMAC_KEY}
      APP_ENV: production
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
      GOOGLE_MOBILE_CLIENT_ID: ${GOOGLE_MOBILE_CLIENT_ID:-}
      OAUTH_STATE_TTL_SEC: ${OAUTH_STATE_TTL_SEC:-300}
      FRONTEND_URL: ${FRONTEND_URL}
      APPLE_CLIENT_ID: ${APPLE_CLIENT_ID:-}
      APPLE_TEAM_ID: ${APPLE_TEAM_ID:-}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-none}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS}
      VERIFICATION_CODE_TTL_SEC: ${VERIFICATION_CODE_TTL_SEC:-600}
      RESET_TOKEN_TTL_SEC: ${RESET_TOKEN_TTL_SEC:-1800}
      MFA_TOKEN_TTL_SEC: ${MFA_TOKEN_TTL_SEC:-300}
      MAX_SESSIONS_LEARNER: ${MAX_SESSIONS_LEARNER:-5}
      MAX_SESSIONS_MANAGER: ${MAX_SESSIONS_MANAGER:-3}
      MAX_SESSIONS_ADMIN: ${MAX_SESSIONS_ADMIN:-2}
      MAX_SESSIONS_HYMN: ${MAX_SESSIONS_HYMN:-2}
      SESSION_REAPER_INTERVAL_SEC: ${SESSION_REAPER_INTERVAL_SEC:-300}
      ADMIN_IP_ALLOWLIST: ${ADMIN_IP_ALLOWLIST:-}
      VIMEO_ACCESS_TOKEN: ${VIMEO_ACCESS_TOKEN:-}
      PAYMENT_PROVIDER: ${PAYMENT_PROVIDER:?PAYMENT_PROVIDER is not set. Please set it to 'paddle' or 'none'.}
      PADDLE_API_KEY: ${PADDLE_API_KEY:-}
      PADDLE_CLIENT_TOKEN: ${PADDLE_CLIENT_TOKEN:-}
      PADDLE_SANDBOX: ${PADDLE_SANDBOX:-true}
      PADDLE_WEBHOOK_SECRET: ${PADDLE_WEBHOOK_SECRET:-}
      REVENUECAT_API_KEY: ${REVENUECAT_API_KEY:-}
      REVENUECAT_WEBHOOK_AUTH_TOKEN: ${REVENUECAT_WEBHOOK_AUTH_TOKEN:-}
      PADDLE_PRICE_MONTH_1: ${PADDLE_PRICE_MONTH_1:-}
      PADDLE_PRICE_MONTH_3: ${PADDLE_PRICE_MONTH_3:-}
      PADDLE_PRICE_MONTH_6: ${PADDLE_PRICE_MONTH_6:-}
      PADDLE_PRICE_MONTH_12: ${PADDLE_PRICE_MONTH_12:-}
      PADDLE_PRICE_EBOOK: ${PADDLE_PRICE_EBOOK:-}
      PADDLE_DISCOUNT_MONTH_3: ${PADDLE_DISCOUNT_MONTH_3:-}
      PADDLE_DISCOUNT_MONTH_6: ${PADDLE_DISCOUNT_MONTH_6:-}
      PADDLE_DISCOUNT_MONTH_12: ${PADDLE_DISCOUNT_MONTH_12:-}
      RATE_LIMIT_EBOOK_PAGE_MAX: ${RATE_LIMIT_EBOOK_PAGE_MAX:-30}
      RATE_LIMIT_EBOOK_PAGE_WINDOW_SEC: ${RATE_LIMIT_EBOOK_PAGE_WINDOW_SEC:-60}
      RATE_LIMIT_EBOOK_PURCHASE_MAX: ${RATE_LIMIT_EBOOK_PURCHASE_MAX:-5}
      RATE_LIMIT_EBOOK_PURCHASE_WINDOW_SEC: ${RATE_LIMIT_EBOOK_PURCHASE_WINDOW_SEC:-3600}
      EBOOK_SESSION_TTL_SEC: ${EBOOK_SESSION_TTL_SEC:-90}
      EBOOK_TILE_MODE: ${EBOOK_TILE_MODE:-false}
      EBOOK_TILE_GRID_ROWS: ${EBOOK_TILE_GRID_ROWS:-3}
      EBOOK_TILE_GRID_COLS: ${EBOOK_TILE_GRID_COLS:-3}
      RATE_LIMIT_EBOOK_TILE_MAX: ${RATE_LIMIT_EBOOK_TILE_MAX:-270}
      RATE_LIMIT_EBOOK_TILE_WINDOW_SEC: ${RATE_LIMIT_EBOOK_TILE_WINDOW_SEC:-60}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - amk-network
    logging: *default-logging

  db:
    image: postgres:16
    container_name: amk-pg
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: amazing_korean_db
      # 보안 2.3 Phase 1: 신규/재생성 DB 시 db-init 스크립트가 amk_app role 생성에 사용.
      # 기존 볼륨엔 initdb 미실행 → §13 1회 수동 적용. Phase 2 전엔 secret 미설정 가능(공백).
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:-}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # 보안 2.3: 신규/재생성 DB 부트스트랩(멱등). 기존 볼륨엔 미실행(§13 수동).
      - ./db-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - amk-network
    logging: *default-logging

  redis:
    image: redis:7
    container_name: amk-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - amk-network
    logging: *default-logging

  nginx:
    image: nginx:1.27-alpine
    container_name: amk-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - api
    networks:
      - amk-network
    logging: *default-logging

  certbot:
    image: certbot/certbot
    container_name: amk-certbot
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    # 12시간마다 renew 시도. --quiet = 갱신 불필요 시 출력 X (로그 깔끔). --deploy-hook
    # = 갱신 성공 시에만 실행되는 hook (renew 가 no-op 이면 hook 미실행). hook 안에서
    # nginx reload 하려면 docker socket mount 또는 별도 sidecar 필요 (보안적 비권장).
    # 현재는 갱신 시각 로깅만. nginx 신규 cert 적용은 host 측 수동 또는 deploy.yml 의
    # post-renew step 에서 `docker exec amk-nginx nginx -s reload` 실행 (zero-downtime).
    # 절차 = AMK_DEPLOY_OPS §3 SSL 갱신 가이드 참조.
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet --deploy-hook \"echo Certificate renewed at $$(date -u +%FT%TZ)\"; sleep 12h & wait $${!}; done;'"
    logging: *default-logging

networks:
  amk-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data: